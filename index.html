<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMap Pro - Advanced Mapping Platform</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Professional mapping platform with real-time directions, weather, and location search">
    <meta name="keywords" content="maps, navigation, directions, weather, geolocation">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        /* Fix for any missing styles */
        .leaflet-routing-container { display: none; }
        .leaflet-control-attribution { font-size: 8px; background: rgba(0,0,0,0.5); color: #999; }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader-container" id="loader">
        <div class="loader-brand">
            <i class="fas fa-map-marked-alt"></i>
            <span>GeoMap Pro</span>
        </div>
        <div class="loader-bar">
            <div class="loader-progress" id="loaderProgress"></div>
        </div>
    </div>

    <!-- App Container -->
    <div class="app" id="app">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar">
            <button class="nav-item active" data-nav="explore">
                <i class="fas fa-compass"></i>
                <span>Explore</span>
            </button>
            <button class="nav-item" data-nav="traffic">
                <i class="fas fa-traffic-light"></i>
                <span>Traffic</span>
            </button>
            <button class="nav-item" data-nav="transit">
                <i class="fas fa-subway"></i>
                <span>Transit</span>
            </button>
            <button class="nav-item" data-nav="cycling">
                <i class="fas fa-bicycle"></i>
                <span>Cycling</span>
            </button>
            
            <div class="nav-divider"></div>
            
            <button class="nav-item" data-nav="satellite">
                <i class="fas fa-satellite"></i>
                <span>Satellite</span>
            </button>
            <button class="nav-item" data-nav="terrain">
                <i class="fas fa-mountain"></i>
                <span>Terrain</span>
            </button>
            
            <div class="nav-spacer"></div>
            
            <button class="nav-item" data-nav="settings">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </button>
        </nav>

        <!-- Header -->
        <header class="header">
            <div class="brand" id="brandToggle">
                <div class="brand-icon">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <span>GeoMap Pro</span>
            </div>

            <div class="search-wrapper">
                <input type="text" class="search-box" id="searchBox" placeholder="Search for cities, places, addresses..." autocomplete="off">
                <i class="fas fa-search search-icon"></i>
                <button class="search-clear" id="clearSearch">
                    <i class="fas fa-times"></i>
                </button>
                <div class="search-results" id="searchResults"></div>
            </div>

            <div class="header-actions">
                <button class="icon-btn" id="directionsBtn" title="Directions">
                    <i class="fas fa-directions"></i>
                </button>
                <button class="icon-btn" id="locateBtn" title="My Location">
                    <i class="fas fa-crosshairs"></i>
                </button>
                <button class="icon-btn notification" id="notificationsBtn" title="Notifications">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="icon-btn profile-btn" id="profileBtn" title="Profile">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div id="map"></div>

            <!-- Floating Action Buttons -->
            <div class="fab-container">
                <button class="fab" id="zoomInBtn" title="Zoom In">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="fab" id="zoomOutBtn" title="Zoom Out">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="fab primary" id="resetViewBtn" title="Reset View">
                    <i class="fas fa-expand"></i>
                </button>
            </div>

            <!-- Directions Sheet -->
            <div class="sheet" id="directionsSheet">
                <div class="sheet-header">
                    <h2 class="sheet-title">Directions</h2>
                    <button class="sheet-close" id="closeDirectionsBtn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="sheet-content">
                    <div class="input-stack">
                        <div class="input-wrapper start">
                            <i class="fas fa-circle input-icon"></i>
                            <input type="text" class="location-input" id="startPoint" placeholder="Starting point" autocomplete="off">
                        </div>
                        <button class="swap-btn" id="swapBtn" title="Swap">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                        <div class="input-wrapper end">
                            <i class="fas fa-map-marker-alt input-icon"></i>
                            <input type="text" class="location-input" id="endPoint" placeholder="Destination" autocomplete="off">
                        </div>
                    </div>

                    <div class="mode-selector">
                        <button class="mode-btn active" data-mode="driving">
                            <i class="fas fa-car"></i>
                            <span>Driving</span>
                        </button>
                        <button class="mode-btn" data-mode="walking">
                            <i class="fas fa-walking"></i>
                            <span>Walking</span>
                        </button>
                        <button class="mode-btn" data-mode="cycling">
                            <i class="fas fa-bicycle"></i>
                            <span>Cycling</span>
                        </button>
                    </div>

                    <button class="btn-primary" id="calculateRouteBtn">
                        <i class="fas fa-route"></i>
                        Get Directions
                    </button>

                    <div id="routeResults" style="display: none;"></div>
                </div>
            </div>

            <!-- Weather Card -->
            <div class="weather-card" id="weatherCard">
                <div class="weather-header">
                    <div class="weather-location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span id="weatherLocation">New York, US</span>
                    </div>
                    <div class="weather-update" id="weatherUpdate">Just now</div>
                </div>
                <div class="weather-main">
                    <div class="weather-temp" id="weatherTemp">72°</div>
                    <div class="weather-info">
                        <div class="weather-condition" id="weatherCondition">Clear Sky</div>
                        <div class="weather-meta" id="weatherMeta">H: 76° L: 65°</div>
                    </div>
                    <i class="fas fa-sun weather-icon-large" id="weatherIcon"></i>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    
    <!-- Main App Script (using IIFE to avoid module issues) -->
    <script src="js/app.js"></script>
</body>
</html>
