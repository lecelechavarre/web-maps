<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoMap</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Design System - Modern Dark/Light Mode Ready */
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --primary-light: rgba(99, 102, 241, 0.1);
            --secondary: #ec4899;
            --accent: #06b6d4;
            
            /* Semantic Colors */
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            
            /* Neutrals */
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --bg-elevated: rgba(30, 41, 59, 0.8);
            
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-tertiary: #64748b;
            --text-muted: #475569;
            
            /* Effects */
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow-primary: 0 0 20px rgba(99, 102, 241, 0.4);
            --glow-accent: 0 0 20px rgba(6, 182, 212, 0.3);
            
            /* Spacing */
            --space-xs: 0.25rem;
            --space-sm: 0.5rem;
            --space-md: 1rem;
            --space-lg: 1.5rem;
            --space-xl: 2rem;
            
            /* Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            --radius-full: 9999px;
            
            /* Transitions */
            --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 350ms cubic-bezier(0.4, 0, 0.2, 1);
            --transition-spring: 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Loading Screen */
        .loader-container {
            position: fixed;
            inset: 0;
            background: var(--bg-primary);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-lg);
            transition: opacity 600ms ease, visibility 600ms;
        }

        .loader-container.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-brand {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .loader-brand i {
            color: var(--primary);
            font-size: 2rem;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
        }

        .loader-bar {
            width: 200px;
            height: 3px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: var(--radius-full);
            transition: width 300ms ease;
            box-shadow: var(--glow-primary);
        }

        /* App Layout */
        .app {
            display: grid;
            grid-template-areas: 
                "sidebar header"
                "sidebar main";
            grid-template-columns: 72px 1fr;
            grid-template-rows: 72px 1fr;
            height: 100vh;
            width: 100vw;
        }

        .app.sidebar-expanded {
            grid-template-columns: 280px 1fr;
        }

        /* Glassmorphism Header */
        .header {
            grid-area: header;
            display: flex;
            align-items: center;
            padding: 0 var(--space-xl);
            gap: var(--space-lg);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            z-index: 100;
            position: relative;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--text-primary);
            cursor: pointer;
            transition: transform var(--transition-fast);
            padding: var(--space-sm);
            border-radius: var(--radius-md);
        }

        .brand:hover {
            transform: scale(1.02);
            background: var(--primary-light);
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.25rem;
            box-shadow: var(--glow-primary);
        }

        /* Search Component */
        .search-wrapper {
            flex: 1;
            max-width: 600px;
            position: relative;
        }

        .search-box {
            width: 100%;
            height: 44px;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-full);
            padding: 0 var(--space-xl) 0 48px;
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-family: inherit;
            transition: all var(--transition-base);
            outline: none;
        }

        .search-box::placeholder {
            color: var(--text-tertiary);
        }

        .search-box:hover {
            border-color: var(--text-muted);
            background: var(--bg-tertiary);
        }

        .search-box:focus {
            border-color: var(--primary);
            background: var(--bg-secondary);
            box-shadow: 0 0 0 3px var(--primary-light), var(--glow-primary);
        }

        .search-icon {
            position: absolute;
            left: var(--space-lg);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 1rem;
            pointer-events: none;
            transition: color var(--transition-fast);
        }

        .search-box:focus + .search-icon {
            color: var(--primary);
        }

        .search-clear {
            position: absolute;
            right: var(--space-sm);
            top: 50%;
            transform: translateY(-50%) scale(0);
            background: var(--bg-tertiary);
            border: none;
            width: 28px;
            height: 28px;
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all var(--transition-fast);
        }

        .search-clear.visible {
            transform: translateY(-50%) scale(1);
            opacity: 1;
        }

        .search-clear:hover {
            background: var(--error);
            color: white;
            transform: translateY(-50%) scale(1.1);
        }

        /* Search Results Dropdown */
        .search-results {
            position: absolute;
            top: calc(100% + var(--space-sm));
            left: 0;
            right: 0;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            max-height: 400px;
            overflow-y: auto;
            opacity: 0;
            transform: translateY(-10px) scale(0.98);
            pointer-events: none;
            transition: all var(--transition-base);
            z-index: 200;
        }

        .search-results.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: all;
        }

        .result-item {
            padding: var(--space-md) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            cursor: pointer;
            border-bottom: 1px solid var(--glass-border);
            transition: all var(--transition-fast);
            position: relative;
            overflow: hidden;
        }

        .result-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--primary);
            transform: scaleY(0);
            transition: transform var(--transition-fast);
        }

        .result-item:hover {
            background: rgba(99, 102, 241, 0.1);
            padding-left: calc(var(--space-lg) + 4px);
        }

        .result-item:hover::before {
            transform: scaleY(1);
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-icon {
            width: 40px;
            height: 40px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .result-content {
            flex: 1;
            min-width: 0;
        }

        .result-title {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9375rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-address {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .result-coords {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Header Actions */
        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            position: relative;
            transition: all var(--transition-fast);
        }

        .icon-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: var(--primary);
            opacity: 0;
            transform: scale(0.8);
            transition: all var(--transition-fast);
            z-index: -1;
        }

        .icon-btn:hover {
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .icon-btn:hover::after {
            opacity: 0.1;
            transform: scale(1);
        }

        .icon-btn.active {
            color: var(--primary);
            background: var(--primary-light);
        }

        .icon-btn.active::after {
            opacity: 0.2;
            transform: scale(1);
        }

        .icon-btn.notification::after {
            content: '';
            position: absolute;
            top: 8px;
            right: 8px;
            width: 8px;
            height: 8px;
            background: var(--error);
            border-radius: 50%;
            border: 2px solid var(--bg-secondary);
        }

        /* Sidebar Navigation */
        .sidebar {
            grid-area: sidebar;
            background: var(--bg-secondary);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: var(--space-md);
            gap: var(--space-sm);
            z-index: 90;
            transition: all var(--transition-slow);
            overflow: hidden;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 500;
            text-align: left;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%) scaleY(0);
            width: 3px;
            height: 20px;
            background: var(--primary);
            border-radius: 0 4px 4px 0;
            transition: transform var(--transition-fast);
        }

        .nav-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--primary-light);
            color: var(--primary);
        }

        .nav-item.active::before {
            transform: translateY(-50%) scaleY(1);
        }

        .nav-item i {
            width: 24px;
            text-align: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .nav-item span {
            opacity: 0;
            transform: translateX(-10px);
            transition: all var(--transition-base);
        }

        .app.sidebar-expanded .nav-item span {
            opacity: 1;
            transform: translateX(0);
        }

        .nav-divider {
            height: 1px;
            background: var(--glass-border);
            margin: var(--space-sm) 0;
        }

        .nav-spacer {
            flex: 1;
        }

        /* Main Content Area */
        .main {
            grid-area: main;
            position: relative;
            overflow: hidden;
            background: var(--bg-primary);
        }

        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Floating UI Elements */
        .fab-container {
            position: absolute;
            right: var(--space-xl);
            top: var(--space-xl);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            z-index: 50;
        }

        .fab {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-full);
            border: none;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            font-size: 1.125rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--glass-shadow);
            transition: all var(--transition-base);
        }

        .fab:hover {
            transform: translateY(-2px) scale(1.05);
            background: var(--bg-elevated);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), var(--glow-primary);
        }

        .fab:active {
            transform: translateY(0) scale(0.95);
        }

        .fab.primary {
            background: var(--primary);
            color: white;
        }

        .fab.primary:hover {
            background: var(--primary-hover);
            box-shadow: var(--glow-primary);
        }

        /* Directions Panel - Glass Sheet */
        .sheet {
            position: absolute;
            left: var(--space-xl);
            top: var(--space-xl);
            width: 400px;
            max-height: calc(100% - var(--space-xl) * 2);
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--glass-shadow);
            z-index: 60;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateX(-20px) scale(0.98);
            pointer-events: none;
            transition: all var(--transition-spring);
        }

        .sheet.active {
            opacity: 1;
            transform: translateX(0) scale(1);
            pointer-events: all;
        }

        .sheet-header {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sheet-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .sheet-close {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            border: none;
            background: transparent;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .sheet-close:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            transform: rotate(90deg);
        }

        .sheet-content {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-lg);
        }

        /* Input Stack */
        .input-stack {
            position: relative;
            margin-bottom: var(--space-lg);
        }

        .input-wrapper {
            position: relative;
            margin-bottom: var(--space-sm);
        }

        .input-wrapper:last-child {
            margin-bottom: 0;
        }

        .location-input {
            width: 100%;
            height: 48px;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            padding: 0 var(--space-lg) 0 44px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9375rem;
            transition: all var(--transition-fast);
            outline: none;
        }

        .location-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .location-input::placeholder {
            color: var(--text-tertiary);
        }

        .input-icon {
            position: absolute;
            left: var(--space-md);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 0.875rem;
        }

        .input-wrapper.start .input-icon {
            color: var(--success);
        }

        .input-wrapper.end .input-icon {
            color: var(--error);
        }

        .swap-btn {
            position: absolute;
            right: var(--space-sm);
            top: 50%;
            transform: translateY(-50%);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-full);
            border: 1px solid var(--glass-border);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            transition: all var(--transition-fast);
            z-index: 10;
        }

        .swap-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-50%) rotate(180deg);
        }

        /* Route Mode Selector */
        .mode-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-sm);
            margin-bottom: var(--space-lg);
        }

        .mode-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: var(--space-xs);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .mode-btn i {
            font-size: 1.25rem;
            margin-bottom: 2px;
        }

        .mode-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-primary);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: var(--primary-light);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: var(--glow-primary);
        }

        /* Primary Button */
        .btn-primary {
            width: 100%;
            height: 44px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: var(--radius-md);
            color: white;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-sm);
            transition: all var(--transition-fast);
            box-shadow: var(--glow-primary);
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 600ms;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.5);
        }

        .btn-primary:hover::before {
            transform: translateX(100%);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Route Results */
        .route-summary {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-top: var(--space-lg);
            border: 1px solid var(--glass-border);
        }

        .route-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-md);
        }

        .route-time {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
        }

        .route-distance {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            margin-top: var(--space-xs);
        }

        .route-badge {
            background: var(--success);
            color: white;
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
        }

        .steps-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
        }

        .step {
            display: flex;
            gap: var(--space-md);
            padding: var(--space-md);
            background: var(--bg-tertiary);
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .step:hover {
            background: var(--bg-elevated);
            transform: translateX(4px);
        }

        .step-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.875rem;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-instruction {
            font-size: 0.9375rem;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .step-distance {
            font-size: 0.75rem;
            color: var(--text-tertiary);
        }

        /* Weather Widget - Floating Card */
        .weather-card {
            position: absolute;
            right: var(--space-xl);
            bottom: var(--space-xl);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
            padding: var(--space-lg);
            min-width: 200px;
            box-shadow: var(--glass-shadow);
            z-index: 50;
            transform: translateY(0);
            transition: all var(--transition-base);
        }

        .weather-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .weather-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-md);
        }

        .weather-location {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: var(--space-xs);
        }

        .weather-update {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: var(--space-lg);
        }

        .weather-temp {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-primary);
            line-height: 1;
        }

        .weather-info {
            flex: 1;
        }

        .weather-condition {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .weather-meta {
            font-size: 0.8125rem;
            color: var(--text-tertiary);
        }

        .weather-icon-large {
            font-size: 3rem;
            color: var(--warning);
            filter: drop-shadow(0 4px 12px rgba(245, 158, 11, 0.3));
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: var(--space-xl);
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            pointer-events: none;
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-full);
            padding: var(--space-md) var(--space-xl);
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: var(--space-md);
            box-shadow: var(--glass-shadow);
            transform: translateY(100px);
            opacity: 0;
            transition: all var(--transition-spring);
            pointer-events: all;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
            background: rgba(16, 185, 129, 0.1);
        }

        .toast.error {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.1);
        }

        .toast-icon {
            width: 24px;
            height: 24px;
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .toast.success .toast-icon {
            background: var(--success);
            color: white;
        }

        .toast.error .toast-icon {
            background: var(--error);
            color: white;
        }

        /* Custom Marker */
        .custom-marker {
            position: relative;
        }

        .marker-pin {
            width: 40px;
            height: 40px;
            border-radius: 50% 50% 50% 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            position: absolute;
            transform: rotate(-45deg);
            left: 50%;
            top: 50%;
            margin: -20px 0 0 -20px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% { transform: rotate(-45deg) translateY(0); }
            50% { transform: rotate(-45deg) translateY(-10px); }
        }

        .marker-pin::after {
            content: '';
            width: 24px;
            height: 24px;
            margin: 8px 0 0 8px;
            background: var(--bg-primary);
            position: absolute;
            border-radius: 50%;
        }

        .marker-icon {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            color: white;
            font-size: 1rem;
            z-index: 10;
        }

        /* Popup Redesign */
        .custom-popup .leaflet-popup-content-wrapper {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            color: var(--text-primary);
        }

        .custom-popup .leaflet-popup-tip {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .popup-content {
            min-width: 280px;
            padding: var(--space-sm);
        }

        .popup-header {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: var(--space-xs);
            color: var(--text-primary);
        }

        .popup-address {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: var(--space-md);
            line-height: 1.4;
        }

        .popup-coords {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            background: var(--bg-secondary);
            padding: var(--space-xs) var(--space-sm);
            border-radius: var(--radius-sm);
            margin-bottom: var(--space-md);
            display: inline-block;
        }

        .popup-actions {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: var(--space-sm);
        }

        .popup-btn {
            padding: var(--space-sm) var(--space-md);
            border-radius: var(--radius-md);
            border: none;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-xs);
            transition: all var(--transition-fast);
        }

        .popup-btn.primary {
            background: var(--primary);
            color: white;
        }

        .popup-btn.primary:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: var(--glow-primary);
        }

        .popup-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .popup-btn.secondary:hover {
            background: var(--bg-elevated);
        }

        .popup-btn.danger {
            background: transparent;
            color: var(--error);
            width: 36px;
            padding: 0;
        }

        .popup-btn.danger:hover {
            background: var(--error);
            color: white;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .app {
                grid-template-columns: 0 1fr;
            }
            
            .app.sidebar-expanded {
                grid-template-columns: 280px 1fr;
            }
            
            .sidebar {
                position: fixed;
                left: 0;
                top: 72px;
                bottom: 0;
                width: 280px;
                transform: translateX(-100%);
            }
            
            .app.sidebar-expanded .sidebar {
                transform: translateX(0);
            }
            
            .sheet {
                left: var(--space-md);
                right: var(--space-md);
                width: auto;
                max-width: 400px;
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 0 var(--space-md);
            }
            
            .brand span {
                display: none;
            }
            
            .fab-container {
                right: var(--space-md);
                top: auto;
                bottom: 100px;
                flex-direction: row;
            }
            
            .weather-card {
                right: var(--space-md);
                left: var(--space-md);
                bottom: var(--space-md);
            }
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-slide-up {
            animation: slideUp 0.4s ease-out;
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        .animate-scale-in {
            animation: scaleIn 0.3s ease-out;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader-container" id="loader">
        <div class="loader-brand">
            <i class="fas fa-map-marked-alt"></i>
            <span>GeoMap Pro</span>
        </div>
        <div class="loader-bar">
            <div class="loader-progress" id="loaderProgress"></div>
        </div>
    </div>

    <!-- App Container -->
    <div class="app" id="app">
        <!-- Sidebar -->
        <nav class="sidebar">
            <button class="nav-item active" onclick="handleNav('explore', this)">
                <i class="fas fa-compass"></i>
                <span>Explore</span>
            </button>
            <button class="nav-item" onclick="handleNav('traffic', this)">
                <i class="fas fa-traffic-light"></i>
                <span>Traffic</span>
            </button>
            <button class="nav-item" onclick="handleNav('transit', this)">
                <i class="fas fa-subway"></i>
                <span>Transit</span>
            </button>
            <button class="nav-item" onclick="handleNav('cycling', this)">
                <i class="fas fa-bicycle"></i>
                <span>Cycling</span>
            </button>
            
            <div class="nav-divider"></div>
            
            <button class="nav-item" onclick="handleNav('satellite', this)">
                <i class="fas fa-satellite"></i>
                <span>Satellite</span>
            </button>
            <button class="nav-item" onclick="handleNav('terrain', this)">
                <i class="fas fa-mountain"></i>
                <span>Terrain</span>
            </button>
            
            <div class="nav-spacer"></div>
            
            <button class="nav-item" onclick="handleNav('settings', this)">
                <i class="fas fa-cog"></i>
                <span>Settings</span>
            </button>
        </nav>

        <!-- Header -->
        <header class="header">
            <div class="brand" onclick="toggleSidebar()">
                <div class="brand-icon">
                    <i class="fas fa-map-marked-alt"></i>
                </div>
                <span>GeoMap Pro</span>
            </div>

            <div class="search-wrapper">
                <input type="text" class="search-box" id="searchBox" placeholder="Search for cities, places, addresses..." autocomplete="off">
                <i class="fas fa-search search-icon"></i>
                <button class="search-clear" id="clearSearch" onclick="clearSearch()">
                    <i class="fas fa-times"></i>
                </button>
                <div class="search-results" id="searchResults"></div>
            </div>

            <div class="header-actions">
                <button class="icon-btn" id="directionsBtn" onclick="toggleDirections()" title="Directions">
                    <i class="fas fa-directions"></i>
                </button>
                <button class="icon-btn" onclick="locateUser()" title="My Location">
                    <i class="fas fa-crosshairs"></i>
                </button>
                <button class="icon-btn notification" title="Notifications">
                    <i class="fas fa-bell"></i>
                </button>
                <button class="icon-btn" style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white;" title="Profile">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div id="map"></div>

            <!-- Floating Action Buttons -->
            <div class="fab-container">
                <button class="fab" onclick="map.zoomIn()" title="Zoom In">
                    <i class="fas fa-plus"></i>
                </button>
                <button class="fab" onclick="map.zoomOut()" title="Zoom Out">
                    <i class="fas fa-minus"></i>
                </button>
                <button class="fab primary" onclick="resetView()" title="Reset View">
                    <i class="fas fa-expand"></i>
                </button>
            </div>

            <!-- Directions Sheet -->
            <div class="sheet" id="directionsSheet">
                <div class="sheet-header">
                    <h2 class="sheet-title">Directions</h2>
                    <button class="sheet-close" onclick="toggleDirections()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="sheet-content">
                    <div class="input-stack">
                        <div class="input-wrapper start">
                            <i class="fas fa-circle input-icon"></i>
                            <input type="text" class="location-input" id="startPoint" placeholder="Starting point" autocomplete="off">
                        </div>
                        <button class="swap-btn" onclick="swapDirections()" title="Swap">
                            <i class="fas fa-exchange-alt"></i>
                        </button>
                        <div class="input-wrapper end">
                            <i class="fas fa-map-marker-alt input-icon"></i>
                            <input type="text" class="location-input" id="endPoint" placeholder="Destination" autocomplete="off">
                        </div>
                    </div>

                    <div class="mode-selector">
                        <button class="mode-btn active" onclick="selectMode(this, 'driving')">
                            <i class="fas fa-car"></i>
                            <span>Driving</span>
                        </button>
                        <button class="mode-btn" onclick="selectMode(this, 'walking')">
                            <i class="fas fa-walking"></i>
                            <span>Walking</span>
                        </button>
                        <button class="mode-btn" onclick="selectMode(this, 'cycling')">
                            <i class="fas fa-bicycle"></i>
                            <span>Cycling</span>
                        </button>
                    </div>

                    <button class="btn-primary" onclick="calculateRoute()">
                        <i class="fas fa-route"></i>
                        Get Directions
                    </button>

                    <div id="routeResults" style="display: none;">
                        <!-- Route results injected here -->
                    </div>
                </div>
            </div>

            <!-- Weather Card -->
            <div class="weather-card" id="weatherCard">
                <div class="weather-header">
                    <div class="weather-location">
                        <i class="fas fa-map-marker-alt"></i>
                        <span id="weatherLocation">New York, US</span>
                    </div>
                    <div class="weather-update">Just now</div>
                </div>
                <div class="weather-main">
                    <div class="weather-temp" id="weatherTemp">72°</div>
                    <div class="weather-info">
                        <div class="weather-condition" id="weatherCondition">Clear Sky</div>
                        <div class="weather-meta">H: 76° L: 65°</div>
                    </div>
                    <i class="fas fa-sun weather-icon-large" id="weatherIcon"></i>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.min.js"></script>
    <script>
        // App State
        const state = {
            sidebarExpanded: false,
            currentMode: 'driving',
            markers: [],
            currentMarker: null,
            routingControl: null,
            map: null,
            weatherTimer: null
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            simulateLoading();
            initMap();
            setupEventListeners();
        });

        function simulateLoading() {
            const progress = document.getElementById('loaderProgress');
            let width = 0;
            const interval = setInterval(() => {
                width += Math.random() * 15;
                if (width > 100) width = 100;
                progress.style.width = width + '%';
                
                if (width === 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('loader').classList.add('hidden');
                    }, 400);
                }
            }, 150);
        }

        function initMap() {
            // Initialize map with dark theme tiles
            state.map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([40.7128, -74.0060], 13);

            // Dark theme map tiles (CartoDB Dark Matter)
            const darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19,
                attribution: '©OpenStreetMap, ©CartoDB'
            });

            // Light tiles
            const lightTiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            });

            // Satellite
            const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: '© Esri'
            });

            darkTiles.addTo(state.map);
            state.map.darkTiles = darkTiles;
            state.map.lightTiles = lightTiles;
            state.map.satellite = satellite;

            // Routing control
            state.routingControl = L.Routing.control({
                waypoints: [],
                routeWhileDragging: true,
                show: false,
                addWaypoints: false,
                createMarker: () => null
            }).addTo(state.map);

            state.routingControl.on('routesfound', (e) => displayRouteResults(e.routes[0]));
            
            // Click to add marker
            state.map.on('click', (e) => {
                addMarker(e.latlng.lat, e.latlng.lng, 'Selected Location');
            });

            // Update weather on move
            state.map.on('moveend', () => {
                const center = state.map.getCenter();
                fetchWeather(center.lat, center.lng);
            });

            // Initial weather
            fetchWeather(40.7128, -74.0060, 'New York');
        }

        function setupEventListeners() {
            // Search with debounce
            const searchBox = document.getElementById('searchBox');
            let debounceTimer;
            
            searchBox.addEventListener('input', (e) => {
                const value = e.target.value;
                document.getElementById('clearSearch').classList.toggle('visible', value.length > 0);
                
                clearTimeout(debounceTimer);
                if (value.length < 3) {
                    document.getElementById('searchResults').classList.remove('active');
                    return;
                }
                
                debounceTimer = setTimeout(() => performSearch(value), 400);
            });

            // Close search on outside click
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-wrapper')) {
                    document.getElementById('searchResults').classList.remove('active');
                }
            });
        }

        // Search functionality
        async function performSearch(query) {
            const container = document.getElementById('searchResults');
            container.innerHTML = '<div class="result-item"><div class="result-content"><div class="result-title">Searching...</div></div></div>';
            container.classList.add('active');

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
                const data = await response.json();
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="result-item"><div class="result-content"><div class="result-title">No results found</div><div class="result-address">Try a different search term</div></div></div>';
                    return;
                }

                container.innerHTML = data.map(place => `
                    <div class="result-item" onclick="flyToLocation(${place.lat}, ${place.lon}, '${place.display_name.replace(/'/g, "\\'")}')">
                        <div class="result-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="result-content">
                            <div class="result-title">${place.display_name.split(',')[0]}</div>
                            <div class="result-address">${place.display_name}</div>
                            <div class="result-coords">${parseFloat(place.lat).toFixed(4)}, ${parseFloat(place.lon).toFixed(4)}</div>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                container.innerHTML = '<div class="result-item"><div class="result-content"><div class="result-title">Search failed</div><div class="result-address">Please check your connection</div></div></div>';
            }
        }

        function flyToLocation(lat, lng, name) {
            state.map.flyTo([lat, lng], 16, { duration: 1.5 });
            clearMarkers();
            addMarker(lat, lng, name.split(',')[0], name);
            document.getElementById('searchBox').value = name.split(',')[0];
            document.getElementById('searchResults').classList.remove('active');
            fetchWeather(lat, lng, name.split(',')[0]);
            showToast(`Found: ${name.split(',')[0]}`, 'success');
        }

        function addMarker(lat, lng, title, address = null) {
            const customIcon = L.divIcon({
                className: 'custom-marker',
                html: `
                    <div class="marker-pin"></div>
                    <i class="fas fa-map-marker-alt marker-icon"></i>
                `,
                iconSize: [40, 40],
                iconAnchor: [20, 40]
            });

            const marker = L.marker([lat, lng], { icon: customIcon }).addTo(state.map);
            
            const popupContent = `
                <div class="popup-content">
                    <div class="popup-header">${title}</div>
                    <div class="popup-address">${address || `${lat.toFixed(4)}, ${lng.toFixed(4)}`}</div>
                    <div class="popup-coords">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>
                    <div class="popup-actions">
                        <button class="popup-btn primary" onclick="setAsStart(${lat}, ${lng}, '${title.replace(/'/g, "\\'")}')">
                            <i class="fas fa-play"></i> Start
                        </button>
                        <button class="popup-btn secondary" onclick="setAsEnd(${lat}, ${lng}, '${title.replace(/'/g, "\\'")}')">
                            <i class="fas fa-stop"></i> End
                        </button>
                        <button class="popup-btn danger" onclick="removeMarker(this)">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
            
            marker.bindPopup(popupContent, { 
                className: 'custom-popup',
                closeButton: false
            });
            
            state.markers.push(marker);
            state.currentMarker = marker;
            return marker;
        }

        function clearMarkers() {
            state.markers.forEach(m => state.map.removeLayer(m));
            state.markers = [];
        }

        function removeMarker(btn) {
            if (state.currentMarker) {
                state.map.removeLayer(state.currentMarker);
                state.markers = state.markers.filter(m => m !== state.currentMarker);
                state.currentMarker = null;
            }
        }

        function clearSearch() {
            document.getElementById('searchBox').value = '';
            document.getElementById('clearSearch').classList.remove('visible');
            document.getElementById('searchResults').classList.remove('active');
            clearMarkers();
        }

        // Directions
        function toggleDirections() {
            const sheet = document.getElementById('directionsSheet');
            const btn = document.getElementById('directionsBtn');
            
            sheet.classList.toggle('active');
            btn.classList.toggle('active');
            
            if (!sheet.classList.contains('active')) {
                state.routingControl.setWaypoints([]);
                document.getElementById('routeResults').style.display = 'none';
            }
        }

        function setAsStart(lat, lng, name) {
            document.getElementById('startPoint').value = name;
            document.getElementById('startPoint').dataset.lat = lat;
            document.getElementById('startPoint').dataset.lng = lng;
            if (!document.getElementById('directionsSheet').classList.contains('active')) {
                toggleDirections();
            }
            showToast('Set as starting point', 'success');
        }

        function setAsEnd(lat, lng, name) {
            document.getElementById('endPoint').value = name;
            document.getElementById('endPoint').dataset.lat = lat;
            document.getElementById('endPoint').dataset.lng = lng;
            if (!document.getElementById('directionsSheet').classList.contains('active')) {
                toggleDirections();
            }
            showToast('Set as destination', 'success');
        }

        function swapDirections() {
            const start = document.getElementById('startPoint');
            const end = document.getElementById('endPoint');
            
            [start.value, end.value] = [end.value, start.value];
            [start.dataset.lat, end.dataset.lat] = [end.dataset.lat, start.dataset.lat];
            [start.dataset.lng, end.dataset.lng] = [end.dataset.lng, start.dataset.lng];
        }

        function selectMode(btn, mode) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.currentMode = mode;
        }

        async function calculateRoute() {
            const start = document.getElementById('startPoint');
            const end = document.getElementById('endPoint');
            
            let startLat = start.dataset.lat;
            let startLng = start.dataset.lng;
            let endLat = end.dataset.lat;
            let endLng = end.dataset.lng;
            
            // Geocode if needed
            if (!startLat && start.value) {
                const coords = await geocode(start.value);
                if (!coords) return showToast('Could not find start location', 'error');
                startLat = coords.lat;
                startLng = coords.lng;
            }
            
            if (!endLat && end.value) {
                const coords = await geocode(end.value);
                if (!coords) return showToast('Could not find destination', 'error');
                endLat = coords.lat;
                endLng = coords.lng;
            }
            
            if (!startLat || !endLat) {
                return showToast('Please enter both locations', 'error');
            }
            
            state.routingControl.setWaypoints([
                L.latLng(parseFloat(startLat), parseFloat(startLng)),
                L.latLng(parseFloat(endLat), parseFloat(endLng))
            ]);
            
            showToast('Calculating route...', 'success');
        }

        async function geocode(query) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                return data.length ? { lat: data[0].lat, lng: data[0].lon } : null;
            } catch (e) {
                return null;
            }
        }

        function displayRouteResults(route) {
            const container = document.getElementById('routeResults');
            const distance = (route.summary.totalDistance / 1000).toFixed(1);
            const time = Math.round(route.summary.totalTime / 60);
            
            container.innerHTML = `
                <div class="route-summary animate-slide-up">
                    <div class="route-header">
                        <div>
                            <div class="route-time">${formatTime(time)}</div>
                            <div class="route-distance">${distance} km</div>
                        </div>
                        <div class="route-badge">Fastest</div>
                    </div>
                    <div class="steps-list">
                        ${route.instructions.slice(0, 4).map((step, i) => `
                            <div class="step animate-slide-up" style="animation-delay: ${i * 0.1}s">
                                <div class="step-icon"><i class="fas ${getStepIcon(step.type)}"></i></div>
                                <div class="step-content">
                                    <div class="step-instruction">${step.text}</div>
                                    ${step.distance > 0 ? `<div class="step-distance">${(step.distance / 1000).toFixed(1)} km</div>` : ''}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            container.style.display = 'block';
        }

        function formatTime(minutes) {
            if (minutes < 60) return `${minutes} min`;
            const h = Math.floor(minutes / 60);
            const m = minutes % 60;
            return m > 0 ? `${h}h ${m}m` : `${h}h`;
        }

        function getStepIcon(type) {
            const icons = {
                'Straight': 'fa-arrow-up',
                'Right': 'fa-arrow-right',
                'Left': 'fa-arrow-left',
                'SharpRight': 'fa-arrow-right',
                'SharpLeft': 'fa-arrow-left',
                'TurnAround': 'fa-undo',
                'DestinationReached': 'fa-flag-checkered'
            };
            return icons[type] || 'fa-arrow-up';
        }

        // Navigation
        function toggleSidebar() {
            state.sidebarExpanded = !state.sidebarExpanded;
            document.getElementById('app').classList.toggle('sidebar-expanded', state.sidebarExpanded);
        }

        function handleNav(action, element) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            
            switch(action) {
                case 'satellite':
                    state.map.removeLayer(state.map.darkTiles);
                    state.map.satellite.addTo(state.map);
                    showToast('Satellite view enabled', 'success');
                    break;
                case 'terrain':
                case 'explore':
                    state.map.removeLayer(state.map.satellite);
                    state.map.darkTiles.addTo(state.map);
                    showToast(action === 'terrain' ? 'Terrain view enabled' : 'Explore mode', 'success');
                    break;
                case 'traffic':
                    showToast('Traffic layer enabled', 'success');
                    break;
                case 'settings':
                    showToast('Settings coming soon', 'success');
                    break;
                default:
                    showToast(`${action} mode activated`, 'success');
            }
        }

        // Weather
        async function fetchWeather(lat, lng, locationName) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
                const data = await res.json();
                
                if (data.current_weather) {
                    updateWeatherUI(data.current_weather, locationName);
                }
            } catch (e) {
                console.error('Weather error:', e);
            }
        }

        function updateWeatherUI(weather, location) {
            const temp = Math.round(weather.temperature);
            const code = weather.weathercode;
            
            const conditions = {
                0: { text: 'Clear Sky', icon: 'fa-sun', color: '#f59e0b' },
                1: { text: 'Partly Cloudy', icon: 'fa-cloud-sun', color: '#f59e0b' },
                2: { text: 'Cloudy', icon: 'fa-cloud', color: '#9ca3af' },
                3: { text: 'Overcast', icon: 'fa-cloud', color: '#6b7280' },
                61: { text: 'Rain', icon: 'fa-cloud-rain', color: '#3b82f6' },
                71: { text: 'Snow', icon: 'fa-snowflake', color: '#06b6d4' }
            };
            
            const cond = conditions[code] || conditions[0];
            
            document.getElementById('weatherTemp').textContent = `${temp}°`;
            document.getElementById('weatherCondition').textContent = cond.text;
            document.getElementById('weatherLocation').textContent = location || 'Current Location';
            
            const icon = document.getElementById('weatherIcon');
            icon.className = `fas ${cond.icon} weather-icon-large`;
            icon.style.color = cond.color;
            icon.style.filter = `drop-shadow(0 4px 12px ${cond.color}40)`;
        }

        // Utilities
        function locateUser() {
            showToast('Locating...', 'success');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude } = pos.coords;
                        state.map.flyTo([latitude, longitude], 16);
                        addMarker(latitude, longitude, 'Your Location');
                        showToast('Location found!', 'success');
                    },
                    () => {
                        showToast('Location access denied', 'error');
                    }
                );
            }
        }

        function resetView() {
            state.map.setView([40.7128, -74.0060], 13);
            showToast('View reset', 'success');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="toast-icon"><i class="fas ${type === 'success' ? 'fa-check' : 'fa-exclamation'}"></i></div>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            // Trigger animation
            requestAnimationFrame(() => toast.classList.add('show'));
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
